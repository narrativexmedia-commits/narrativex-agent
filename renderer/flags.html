<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Flags</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    h2 { color: #333; }
    .flag { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .flag p { margin: 4px 0; font-size: 14px; color: #555; }
    .flag textarea { width: 100%; margin-top: 8px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; resize: vertical; }
    .flag button { margin-top: 8px; padding: 6px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .flag button:hover { background: #4338ca; }
    .status { font-size: 12px; font-weight: bold; margin-top: 4px; }
    .pending { color: orange; }
    .approved { color: green; }
    .rejected { color: red; }
    #empty { color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Activity Flags</h2>
  <div id="flags-container"><p id="empty">Loading...</p></div>

  <script>
    const { ipcRenderer } = require('electron');

    window.addEventListener('DOMContentLoaded', async () => {
      const flags = await ipcRenderer.invoke('get-flags');
      const container = document.getElementById('flags-container');

      if (!flags || flags.length === 0) {
        container.innerHTML = '<p id="empty">No flags today.</p>';
        return;
      }

      container.innerHTML = '';
      flags.forEach(flag => {
        const div = document.createElement('div');
        div.className = 'flag';
        div.innerHTML = `
          <p><strong>Flagged At:</strong> ${new Date(flag.flagged_at).toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' })}</p>
          <p><strong>Inactive Duration:</strong> ${flag.duration_minutes} mins</p>
          <p class="status ${flag.status}">${flag.status.toUpperCase()}</p>
          ${flag.status === 'pending' ? `
            <textarea id="exp-${flag.id}" placeholder="Write explanation..." rows="3">${flag.explanation || ''}</textarea>
            <button onclick="submitExplanation('${flag.id}')">Submit</button>
          ` : `<p><em>${flag.explanation || 'No explanation provided.'}</em></p>`}
        `;
        container.appendChild(div);
      });
    });

    async function submitExplanation(flagId) {
      const text = document.getElementById('exp-' + flagId).value.trim();
      if (!text) return alert('Write explanation first.');
      await ipcRenderer.invoke('submit-explanation', { flagId, explanation: text });
      location.reload();
    }
  </script>
</body>
</html>
